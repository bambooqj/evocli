name: Feature Request
description: Suggest an idea or improvement for EvoCLI
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest an improvement!

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: Is your feature request related to a problem? Describe the use case.
      placeholder: "I often find myself needing to... but currently..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: A clear description of what you want to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've tried.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of EvoCLI does this relate to?
      options:
        - TUI / Interface
        - Memory System
        - Skill System
        - Code Intelligence
        - LLM / Agent
        - Security
        - MCP Integration
        - CLI Commands
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or examples.
