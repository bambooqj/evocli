# EvoCLI autonomous loop messages
# Override by copying to ~/.evocli/prompts/loop_messages.toml
#
# Design principle (Claude Code / Cline pattern):
#   Provide STATE, not DIRECTIVES.
#   The LLM decides what to do with the state information.
#   Code provides context; LLM exercises judgment.

[status]
loading_context = "⚙ 正在构建上下文…"
continuing = "⟳ 继续执行… ({current}/{max})"

[tool_flow]
auto_execute_hint = """
🔄 **检测到匹配的工具流**: {name}
步骤: {steps}
置信度: {score}  历史成功率: {success_rate}

正在自动执行...

"""
step_progress = "{icon} [{current}/{total}] {description}\n"
execution_completed = "\n✅ 工具流执行完成\n{final_output}"
execution_failed = "⚠️ 工具流执行失败（步骤{failed_step}），使用 AI 继续...\n\n"
suggestion_hint = "💡 *发现相关工具流: {name}*  (置信度 {score}，输入 `/flows` 查看)\n\n"
history_entry = "[工具流: {name}]\n{output}"

[errors]
no_api_key = """⚠️  **No API key configured** for provider `{provider}`.

Run `evocli init` to set your key interactively, or export:
```
{key_hint}=sk-...
```
Then restart EvoCLI."""
primary_failed_retrying = "Primary path failed: {error} — retrying with LiteLLM…"
both_llm_failed = """
⛔ **Both LLM paths failed.**
- Primary: `{primary}`
- Fallback: `{fallback}`

Check API key and network, or run `evocli doctor`.
"""
empty_response = "⚠️ The model returned an empty response. This may be a content-filter rejection. Try rephrasing."
unexpected_error = """
⛔ **Unexpected error in agent.stream:** `{error}`
Press F12 to view full logs.
"""

[verification]
auto_verify_banner = "\n\n---\n🔍 **自动验证**: `{command}`\n"
result = "```\n{output}\n```\n{status_icon} 验证{status_text}（exit {exit_code}）\n"
status_pass = "通过"
status_fail = "失败"
retry_prompt = """验证命令失败（exit {exit_code}）:
```
{output}
```
请分析错误，修复问题，然后再次调用 task_complete。"""

[completion]
task_complete_banner = "\n\n---\n✅ **任务完成**\n\n{result}\n"
auto_commit = "💾 **自动提交**: `{message}`{hash_suffix}\n"

[loop]
# Loop state messages — provide STATE, not DIRECTIVES.
# The LLM decides what to do; code only provides current situation.
# Based on: Claude Code noToolsUsed() pattern, Cline loop-status injection.
#
# When LLM produced text only (no tool calls):
# Claude Code equivalent: "If you haven't finished the task, continue working."
forcing_message = """
[Loop state: previous turn had no tool calls]
If the task requires further action, continue. If complete, call task_complete.
"""

# Between iterations when todos remain — state only, no directive:
continuation_with_todos = "[Loop state: {pending_count} todo items still pending]"

# Between iterations when no todos:
continuation_clean = "[Loop state: continuing]"

# Injected on last iteration
last_iteration = "[Loop state: final iteration {current}/{max}] Call task_complete to finish, or give_up if unable to complete."
